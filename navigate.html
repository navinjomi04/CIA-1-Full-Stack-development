<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Journey Corridor - clearwayBlr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=500;700&family=Inter:wght=400;500;600;700&family=JetBrains+Mono:wght=500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, input, button { font-family: 'Inter', sans-serif !important; }
        h1, h2, h3, label { font-family: 'Space Grotesk', sans-serif !important; }
        #routing-preview-map { height: 100%; width: 100%; z-index: 10; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 shadow-xs h-20 flex items-center">
        <div class="max-w-7xl mx-auto w-full px-4 flex items-center justify-between">
            <a href="index.html" class="text-xl font-bold tracking-tight text-slate-900"><i class="fas fa-arrow-left text-sm mr-2 text-slate-400"></i>clearway<span class="text-emerald-600">Blr</span></a>
            <span class="text-xs font-mono font-bold bg-emerald-50 text-emerald-600 border border-emerald-200 px-3 py-1 rounded-lg uppercase">Routing Vector Matrix</span>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
        
        <div class="lg:col-span-4 bg-white border border-slate-200 rounded-2xl p-5 shadow-md flex flex-col justify-between space-y-4">
            <div class="space-y-4">
                <div>
                    <h2 class="text-xl font-bold tracking-tight text-slate-900">Optimize Commute Profile</h2>
                    <p class="text-slate-500 text-xs font-medium mt-0.5">Pre-calculate transit legs avoiding active crowdsourced incidents.</p>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-bold font-mono text-slate-500 uppercase mb-1">Origin Node Lat / Lng</label>
                        <input type="text" id="originCoords" value="12.9716, 77.5946" class="w-full px-3 py-2 text-xs border border-slate-300 rounded-xl font-mono bg-slate-50 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold font-mono text-slate-500 uppercase mb-1">Destination Node Lat / Lng</label>
                        <input type="text" id="destCoords" value="12.9345, 77.6101" class="w-full px-3 py-2 text-xs border border-slate-300 rounded-xl font-mono bg-slate-50 focus:outline-none">
                    </div>
                </div>

                <button onclick="calculateAdaptiveRoute()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs py-3 rounded-xl tracking-wider uppercase transition-all shadow-sm">
                    Map Trajectory Vector
                </button>
            </div>

            <div id="routeMetricsOutput" class="bg-slate-50 border rounded-xl p-3 text-xs hidden space-y-1.5 font-mono">
                <p class="text-emerald-600 font-bold uppercase tracking-wider text-[10px]"><i class="fas fa-circle-check"></i> Convergence Path Calculated</p>
                <p class="text-slate-600">Base Length: ~5.4 KM</p>
                <p class="text-slate-600">Delay Avoided Metrics: 18 Mins</p>
            </div>
        </div>

        <div class="lg:col-span-8 bg-white border border-slate-200 p-4 rounded-2xl shadow-md flex flex-col min-h-[400px]">
            <div class="flex items-center justify-between pb-2 border-b border-slate-100 mb-3">
                <span class="text-xs font-bold uppercase font-mono text-slate-400">Spatial Convergence Viewport</span>
                <span class="text-[10px] font-mono text-slate-500"><i class="fas fa-circle text-emerald-500 animate-pulse text-[8px] mr-1"></i>Map Sync Functional</span>
            </div>
            <div class="flex-1 relative w-full rounded-xl overflow-hidden border">
                <div id="routing-preview-map"></div>
            </div>
        </div>
    </main>

    <script>
        let navMap, pathPolyline;

        function initNavigationViewport() {
            navMap = L.map('routing-preview-map').setView([12.95, 77.60], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(navMap);

            // Seed reference marker bounds matching standard configuration indices
            L.marker([12.9716, 77.5946]).addTo(navMap).bindPopup("Journey Start Coordinates Vector Target");
            L.marker([12.9345, 77.6101]).addTo(navMap).bindPopup("Journey Destination End Segment Coordinate Target");

            // Also parse any reported incidents onto the navigation layout for visibility context
            loadSharedIncidentsOnNav();
        }

        function loadSharedIncidentsOnNav() {
            const currentIncidents = JSON.parse(localStorage.getItem('blr_incidents')) || [];
            currentIncidents.forEach(item => {
                const markerColor = item.type === 'gridlock' ? '#e11d48' : '#ea580c';
                L.circleMarker([item.lat, item.lng], {
                    radius: 6, fillColor: markerColor, color: '#ffffff', weight: 1, fillOpacity: 0.8
                }).addTo(navMap).bindPopup(`<b>Avoid Cluster:</b> ${item.name}`);
            });
        }

        function calculateAdaptiveRoute() {
            const startStr = document.getElementById('originCoords').value.split(',');
            const endStr = document.getElementById('destCoords').value.split(',');
            
            const startPoint = [parseFloat(startStr[0]), parseFloat(startStr[1])];
            const endPoint = [parseFloat(endStr[0]), parseFloat(endStr[1])];

            if (pathPolyline) navMap.removeLayer(pathPolyline);

            // Map standard spatial vector line coordinates array
            const pointsArray = [
                startPoint,
                [12.9550, 77.5980],
                [12.9420, 77.6050],
                endPoint
            ];

            pathPolyline = L.polyline(pointsArray, {color: '#059669', weight: 4, dashArray: '5, 8'}).addTo(navMap);
            navMap.fitBounds(pathPolyline.getBounds());

            // Expose structural calculations metadata readout field strings
            const metricsElement = document.getElementById('routeMetricsOutput');
            metricsElement.classList.remove('hidden');
        }

        window.onload = initNavigationViewport;
    </script>
</body>
</html>
